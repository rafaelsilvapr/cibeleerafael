<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#284F3C"/>
  <!-- C e R estilizados em Cormorant/serif — forma simples e legível em 16px -->
  <text x="50%" y="50%" dominant-baseline="central" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="36" font-weight="600" letter-spacing="-1"
        fill="#F1ECE0">CR</text>
  <!-- ponto âmbar — assinatura da marca -->
  <circle cx="54" cy="14" r="5" fill="#C9A24A"/>
</svg>
